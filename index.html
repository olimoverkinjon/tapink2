<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Erkinjon Olimov</title>
<meta name="description" content="Erkinjon Olimov — rasmiy sahifa. Telegram, Instagram, YouTube va aloqa." />

<meta property="og:title" content="Erkinjon Olimov" />
<meta property="og:description" content="Barcha ijtimoiy tarmoqlar va aloqa bir joyda." />
<meta property="og:type" content="profile" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  :root{
    --ink:        #0c1024;
    --glow-violet:#4b3f9e;
    --glow-blue:  #2f4ea8;
    --glow-amber: #e0a23a;

    --card:       rgba(255,255,255,.07);
    --card-line:  rgba(255,255,255,.14);
    --card-line-2:rgba(255,255,255,.08);

    --text:       #f4f3fb;
    --text-soft:  #b9bad6;
    --text-mute:  #8587a8;
    --accent:     #f0b54e;

    --tg:   #2aabee;
    --ig:   #e1306c;
    --yt:   #ff3b30;
    --wa:   #25d366;

    --radius:    24px;
    --radius-sm: 16px;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html{ -webkit-text-size-adjust:100%; }

  body{
    font-family:"Inter", system-ui, sans-serif;
    color:var(--text);
    background:var(--ink);
    min-height:100dvh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:clamp(16px, 4vw, 40px);
    position:relative;
    overflow-x:hidden;
  }

  /* Ambient gradient glows */
  .aura{ position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
  .aura::before,.aura::after{
    content:""; position:absolute; border-radius:50%;
    filter:blur(70px); opacity:.7;
    animation:drift 16s ease-in-out infinite alternate;
  }
  .aura::before{
    width:60vmax; height:60vmax; top:-22vmax; left:-12vmax;
    background:radial-gradient(circle at 30% 30%, var(--glow-violet), transparent 62%),
               radial-gradient(circle at 70% 60%, var(--glow-blue), transparent 60%);
  }
  .aura::after{
    width:48vmax; height:48vmax; bottom:-20vmax; right:-14vmax;
    background:radial-gradient(circle at 50% 50%, var(--glow-amber), transparent 60%);
    opacity:.4; animation-delay:-7s;
  }
  @keyframes drift{
    from{ transform:translate3d(0,0,0) scale(1); }
    to  { transform:translate3d(2.5vmax,3vmax,0) scale(1.08); }
  }

  /* ---- Card ---- */
  .wrap{ position:relative; z-index:1; width:100%; max-width:440px; margin:auto;
         perspective:1100px; }

  .card{
    background:var(--card);
    border:1px solid var(--card-line);
    border-radius:var(--radius);
    backdrop-filter:blur(22px) saturate(140%);
    -webkit-backdrop-filter:blur(22px) saturate(140%);
    padding:clamp(22px, 6vw, 34px);
    box-shadow:0 30px 60px -24px rgba(0,0,0,.6),
               inset 0 1px 0 rgba(255,255,255,.08);
    text-align:center;
    transform-style:preserve-3d;
    transition:transform .35s cubic-bezier(.2,.7,.2,1), box-shadow .35s ease;
    will-change:transform;
  }

  /* ---- Smooth entrance choreography ---- */
  .reveal{ opacity:0; animation:fadeUp .62s cubic-bezier(.2,.75,.25,1) forwards;
           animation-delay:var(--d, 0s); }
  @keyframes fadeUp{
    from{ opacity:0; transform:translateY(18px); }
    to  { opacity:1; transform:translateY(0); }
  }

  /* ---- Avatar ---- */
  .avatar{
    width:104px; height:104px; margin:0 auto 16px;
    border-radius:50%; display:grid; place-items:center;
    background:linear-gradient(150deg, var(--glow-violet), var(--glow-amber));
    padding:3px;
    box-shadow:0 10px 30px -8px rgba(0,0,0,.55);
    animation:avatarIn .8s cubic-bezier(.2,.8,.2,1) both,
              float 5.5s ease-in-out 1.3s infinite;
  }
  @keyframes avatarIn{
    from{ opacity:0; transform:translateY(12px) scale(.82); }
    to  { opacity:1; transform:translateY(0) scale(1); }
  }
  @keyframes float{
    0%,100%{ transform:translateY(0); }
    50%    { transform:translateY(-6px); }
  }
  .avatar > div{
    width:100%; height:100%; border-radius:50%;
    background:#191d3a; display:grid; place-items:center; overflow:hidden;
    font-family:"Bricolage Grotesque", sans-serif; font-weight:800;
    font-size:36px; letter-spacing:.5px; color:var(--text);
  }
  .avatar img{ width:100%; height:100%; object-fit:cover; }

  /* ---- Name + tagline ---- */
  .name{
    font-family:"Bricolage Grotesque", sans-serif; font-weight:800;
    font-size:clamp(26px, 7vw, 32px); line-height:1.05; letter-spacing:-.5px;
  }
  .role{ margin-top:8px; font-size:14.5px; font-weight:500; color:var(--accent); letter-spacing:.3px; }
  .welcome{ margin-top:14px; font-size:14px; line-height:1.5; color:var(--text-soft);
            max-width:30ch; margin-inline:auto; }

  .divider{ height:1px; background:linear-gradient(90deg, transparent, var(--card-line), transparent);
            margin:22px 0 18px; }

  .eyebrow{ font-size:11px; font-weight:600; letter-spacing:1.6px; text-transform:uppercase;
            color:var(--text-mute); text-align:left; margin:0 4px 10px; }

  /* ---- Link buttons ---- */
  .links{ display:flex; flex-direction:column; gap:11px; }

  .link{
    position:relative; overflow:hidden;
    display:flex; align-items:center; gap:14px; width:100%;
    padding:13px 16px; border-radius:var(--radius-sm);
    background:rgba(255,255,255,.05); border:1px solid var(--card-line-2);
    color:var(--text); text-decoration:none; font-size:15px; font-weight:600;
    transition:transform .2s cubic-bezier(.2,.7,.2,1), background .2s ease,
               border-color .2s ease, box-shadow .25s ease;
    -webkit-tap-highlight-color:transparent;
  }
  /* sliding sheen */
  .link::after{
    content:""; position:absolute; inset:0; pointer-events:none;
    background:linear-gradient(115deg, transparent 32%, rgba(255,255,255,.14) 50%, transparent 68%);
    transform:translateX(-130%); transition:transform .65s cubic-bezier(.2,.7,.2,1);
  }
  .link:hover::after,.link:focus-visible::after{ transform:translateX(130%); }

  .link:hover,.link:focus-visible{
    transform:translateY(-2px);
    background:rgba(255,255,255,.09);
    border-color:var(--brand, var(--card-line));
    box-shadow:0 14px 26px -16px var(--brand, rgba(0,0,0,.5));
    outline:none;
  }
  .link:active{ transform:translateY(0) scale(.99); }
  .link:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

  .ico{
    flex:0 0 auto; width:40px; height:40px; border-radius:11px;
    display:grid; place-items:center; background:var(--brand, #2a2f55); color:#fff;
    transition:transform .25s cubic-bezier(.2,.7,.2,1);
  }
  .link:hover .ico{ transform:scale(1.08) rotate(-3deg); }
  .ico svg{ width:21px; height:21px; }

  .link .label{ flex:1; text-align:left; }
  .link .sub{ display:block; font-size:12px; font-weight:500; color:var(--text-mute); margin-top:1px; }
  .chev{ color:var(--text-mute); flex:0 0 auto; transition:transform .2s ease, color .2s ease; }
  .link:hover .chev{ transform:translateX(4px); color:var(--text-soft); }

  /* brand colors */
  .tg{ --brand:var(--tg); }
  .ig .ico{ background:linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf); --brand:var(--ig); }
  .ig{ --brand:var(--ig); }
  .yt{ --brand:var(--yt); }
  .ph{ --brand:#5b6cff; }
  .wa{ --brand:var(--wa); }
  .em{ --brand:#8b8fb0; }

  /* ---- Contact mini-grid ---- */
  .contact-grid{ display:grid; grid-template-columns:1fr 1fr; gap:11px; }
  @media (max-width:360px){ .contact-grid{ grid-template-columns:1fr; } }
  .contact-grid .link{ padding:12px 14px; }
  .contact-grid .ico{ width:36px; height:36px; border-radius:10px; }
  .contact-grid .ico svg{ width:18px; height:18px; }
  .contact-grid .chev{ display:none; }

  /* ---- Footer ---- */
  .foot{ margin-top:22px; text-align:center; font-size:12px; color:var(--text-mute); }
  .foot .heart{ color:var(--accent); display:inline-block; animation:beat 2.4s ease-in-out infinite; }
  @keyframes beat{ 0%,100%{transform:scale(1)} 14%{transform:scale(1.25)} 28%{transform:scale(1)} 42%{transform:scale(1.18)} 56%{transform:scale(1)} }

  @media (min-width:768px){
    body{ align-items:center; }
    .card{ padding:38px; }
  }

  @media (prefers-reduced-motion:reduce){
    .reveal{ opacity:1 !important; animation:none !important; }
    .avatar,.foot .heart,.aura::before,.aura::after{ animation:none !important; }
    .link::after{ display:none; }
    *{ transition-duration:.001ms !important; }
  }
</style>
</head>
<body>
  <div class="aura" aria-hidden="true"></div>

  </main>

  <script>
  (function(){
    var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var fine   = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
    var card   = document.getElementById('card');
    if (!card || reduce || !fine) return;

    var raf = null, tx = 0, ty = 0;
    function apply(){
      card.style.transform = 'rotateX(' + ty.toFixed(2) + 'deg) rotateY(' + tx.toFixed(2) + 'deg)';
      raf = null;
    }
    card.addEventListener('pointermove', function(e){
      var r = card.getBoundingClientRect();
      var px = (e.clientX - r.left) / r.width  - 0.5;
      var py = (e.clientY - r.top)  / r.height - 0.5;
      tx =  px * 5.5;          // chap-o'ng egilish
      ty = -py * 5.5;          // yuqori-past egilish
      if (!raf) raf = requestAnimationFrame(apply);
    });
    card.addEventListener('pointerleave', function(){
      card.style.transform = '';
    });
  })();
  </script>
</body>
</html>
