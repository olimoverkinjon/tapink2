<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Erkinjon Olimov</title>
<meta name="description" content="Erkinjon Olimov — rasmiy sahifa." />
<meta property="og:title" content="Erkinjon Olimov" />
<meta property="og:type" content="profile" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg:       #0d0c0b;
    --surf:     rgba(255,255,255,.042);
    --surf-h:   rgba(255,255,255,.072);
    --line:     rgba(255,255,255,.09);
    --line-h:   rgba(255,255,255,.15);

    --gold:     #c9a96e;
    --gold-low: rgba(201,169,110,.10);

    --t1:  #f0ede8;
    --t2:  #9e998f;
    --t3:  #514e49;

    --tg:  #2aabee;
    --ig:  #e1306c;
    --yt:  #ff3b30;
    --wa:  #25d366;
    --ph:  #7b8cff;

    --r:  22px;
    --r2: 14px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }

  body {
    font-family: "DM Sans", system-ui, sans-serif;
    background: var(--bg);
    color: var(--t1);
    min-height: 100dvh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: clamp(20px, 5vw, 52px) 16px;
  }

  /* Subtle ambient — warm gold at top, cool shadow at bottom */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 45% at 50% -10%, rgba(201,169,110,.07), transparent 72%),
      radial-gradient(ellipse 90% 55% at 50% 110%, rgba(0,0,0,.55), transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ─── Wrap ─── */
  .wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 415px;
    margin: auto;
  }

  /* ─── Card ─── */
  .card {
    background: var(--surf);
    border: 1px solid var(--line);
    border-radius: var(--r);
    padding: clamp(28px, 7vw, 42px);
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  /* Champagne hairline — signature element */
  .card::after {
    content: "";
    position: absolute;
    top: 0; left: 18%; right: 18%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold) 40%, var(--gold) 60%, transparent);
    opacity: .7;
  }

  /* ─── Entrance ─── */
  @keyframes up {
    from { opacity: 0; transform: translateY(13px); }
    to   { opacity: 1; transform: translateY(0);    }
  }
  .f { opacity: 0; animation: up .5s cubic-bezier(.22,.72,.24,1) forwards; animation-delay: var(--d, 0s); }

  /* ─── Avatar ─── */
  .avatar {
    width: 84px; height: 84px;
    border-radius: 50%;
    margin: 0 auto 20px;
    border: 1px solid var(--gold);
    background: var(--gold-low);
    display: grid; place-items: center;
    overflow: hidden;
  }
  .avatar span {
    font-family: "DM Serif Display", serif;
    font-size: 27px;
    color: var(--gold);
    letter-spacing: .5px;
    line-height: 1;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

  /* ─── Name / role ─── */
  .name {
    font-family: "DM Serif Display", serif;
    font-size: clamp(25px, 6.5vw, 31px);
    font-weight: 400;
    letter-spacing: -.15px;
    line-height: 1.06;
  }

  .role {
    margin-top: 9px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2.2px;
    text-transform: uppercase;
    color: var(--gold);
    opacity: .85;
  }

  .bio {
    margin-top: 14px;
    font-size: 13.5px;
    line-height: 1.68;
    color: var(--t2);
    max-width: 27ch;
    margin-inline: auto;
    font-weight: 300;
  }

  /* ─── Divider ─── */
  .sep {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--line-h) 30%, var(--line-h) 70%, transparent);
    margin: 24px 0 20px;
  }

  /* ─── Section label ─── */
  .section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2.4px;
    text-transform: uppercase;
    color: var(--t3);
    text-align: left;
    margin-bottom: 11px;
    padding-left: 2px;
  }

  /* ─── Link list ─── */
  .links { display: flex; flex-direction: column; gap: 8px; }

  .link {
    position: relative;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 13px;
    border-radius: var(--r2);
    border: 1px solid var(--line);
    background: var(--surf);
    color: var(--t1);
    text-decoration: none;
    font-size: 14px;
    font-weight: 400;
    transition:
      background .18s ease,
      border-color .18s ease,
      transform .18s cubic-bezier(.25,.7,.25,1);
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
  }

  /* Left brand accent */
  .link::before {
    content: "";
    position: absolute;
    left: 0; top: 20%; bottom: 20%;
    width: 2px;
    border-radius: 2px;
    background: var(--brand, var(--gold));
    opacity: 0;
    transition: opacity .18s ease, top .18s ease, bottom .18s ease;
  }

  .link:hover,
  .link:focus-visible {
    background: var(--surf-h);
    border-color: var(--line-h);
    transform: translateX(3px);
    outline: none;
  }
  .link:hover::before,
  .link:focus-visible::before {
    opacity: 1;
    top: 15%; bottom: 15%;
  }
  .link:active { transform: translateX(1px) scale(.99); }

  /* Icon box */
  .ico {
    flex: 0 0 auto;
    width: 36px; height: 36px;
    border-radius: 10px;
    display: grid; place-items: center;
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.07);
    color: var(--brand, var(--t2));
    transition: color .18s ease;
  }
  .ico svg { width: 18px; height: 18px; }

  .ltext { flex: 1; text-align: left; line-height: 1.3; }
  .lsub  { display: block; font-size: 11.5px; font-weight: 300; color: var(--t2); margin-top: 1px; }

  .arr {
    flex: 0 0 auto;
    color: var(--t3);
    transition: transform .18s ease, color .18s ease;
  }
  .link:hover .arr { transform: translateX(3px); color: var(--t2); }

  /* Brand tokens */
  .b-tg { --brand: var(--tg); }
  .b-ig { --brand: var(--ig); }
  .b-yt { --brand: var(--yt); }
  .b-wa { --brand: var(--wa); }
  .b-ph { --brand: var(--ph); }

  /* ─── 2-col contact grid ─── */
  .contacts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  @media (max-width: 320px) { .contacts { grid-template-columns: 1fr; } }
  .contacts .link  { padding: 10px 12px; }
  .contacts .ico   { width: 34px; height: 34px; }
  .contacts .ico svg { width: 16px; height: 16px; }
  .contacts .arr   { display: none; }

  /* ─── Footer ─── */
  .foot {
    margin-top: 26px;
    font-size: 11px;
    color: var(--t3);
    letter-spacing: .5px;
    font-weight: 300;
  }
  .foot em { color: var(--gold); font-style: normal; opacity: .8; }

  @media (min-width: 640px) {
    body { align-items: center; min-height: 100dvh; }
  }

  @media (prefers-reduced-motion: reduce) {
    .f { opacity: 1 !important; animation: none !important; }
    * { transition-duration: .001ms !important; }
  }
</style>
</head>
